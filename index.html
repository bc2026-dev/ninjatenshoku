<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者転職 - 公式LINE</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d1a26;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lp-container {
            width: 100%;
            max-width: 450px;
            position: relative;
            line-height: 0;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lp-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .real-button {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #06C755;
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(6,199,85,0.4), 0 4px 0 #04943f;
            cursor: pointer;
        }

        .real-button:active {
            transform: translateY(3px);
        }

        .btn-page1 { font-size: 18px; width: 90%; height: 9.5%; left: 5%; bottom: 3.5%; }
        .btn-page2-A { font-size: 14px; width: 78%; height: 5.2%; left: 11%; top: 52.5%; }
        .btn-page2-B { font-size: 14px; width: 78%; height: 5.2%; left: 11%; top: 85.2%; }
        .btn-page3 { font-size: 16px; width: 66%; height: 7.2%; left: 4%; bottom: 4%; }
        .btn-page4 { font-size: 16px; width: 65%; height: 7.2%; left: 2%; bottom: 4%; }
    </style>

    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-78685DQX0F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-78685DQX0F');
    </script>

    <!-- Meta Pixel -->
    <script>
        !function(f,b,e,v,n,t,s){
            if(f.fbq)return;
            n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;
            n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)
        }(window,document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');

        fbq('init', '1855501908486093');
        fbq('track', 'PageView');
    </script>

    <!-- LINEクリック + スクロール計測 -->
    <script>
        // LINEクリック
        function trackLine(label){
            gtag('event','line_click',{label:label});
            fbq('trackCustom','LineClick',{label:label});
        }

        // スクロール計測
        let s50=false, s90=false;

        window.addEventListener('scroll', function(){
            let scrollTop = window.scrollY;
            let height = document.body.scrollHeight - window.innerHeight;
            let percent = (scrollTop / height) * 100;

            if(percent > 50 && !s50){
                s50 = true;
                gtag('event','scroll_50');
                fbq('trackCustom','Scroll50');
            }

            if(percent > 90 && !s90){
                s90 = true;
                gtag('event','scroll_90');
                fbq('trackCustom','Scroll90');
            }
        });
    </script>

</head>

<body>

<div class="lp-container">
    <img src="lp001.png" class="lp-image">
    <a class="real-button btn-page1"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page1')"
       target="_blank">公式LINEで無料相談する</a>
</div>

<div class="lp-container">
    <img src="lp002.png" class="lp-image">
    <a class="real-button btn-page2-A"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page2A')"
       target="_blank">求人詳細を見る</a>

    <a class="real-button btn-page2-B"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page2B')"
       target="_blank">求人詳細を見る</a>
</div>

<div class="lp-container">
    <img src="lp003.png" class="lp-image">
    <a class="real-button btn-page3"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page3')"
       target="_blank">無料相談はこちら</a>
</div>

<div class="lp-container">
    <img src="lp004.png" class="lp-image">
    <a class="real-button btn-page4"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page4')"
       target="_blank">転職相談する</a>
</div>

</body>
</html>
